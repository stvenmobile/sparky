; Sparky Face Firmware (ESP32 / CYD)
; ----------------------------------

[env:sparky_face]
platform = espressif32 @ 6.7.0
board = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Flash Speed
upload_speed = 460800

; Libraries
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16  ; <--- We need THIS one now
    knolleary/PubSubClient @ ^2.8
    ; bodmer/TFT_eSPI  <-- Removed to prevent conflicts

; Build Flags
build_flags = 
    -D LGFX_USE_V1